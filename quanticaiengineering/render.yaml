services:
  - type: web
    name: isekai-fellow-advisor
    runtime: python
    region: oregon
    # Standard ($25/mo, 2 GB RAM) — required because the RAG boot loads
    # sentence-transformers + torch CPU (~900 MB resident) + FAISS index.
    # Starter (512 MB) OOMs during model load.
    plan: standard
    buildCommand: |
      pip install --upgrade pip &&
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt &&
      python scripts/build_vector_db.py
    startCommand: |
      gunicorn server:app --preload --workers 1 --threads 2 --worker-class gthread --bind 0.0.0.0:$PORT --timeout 120 --log-level info
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      # LLM provider — Claude (cheapest = haiku)
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      # Auth — set both in Render dashboard so they're not committed
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PASSWORD
        sync: false
      # Embeddings / retrieval
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: EMBEDDING_DIMENSION
        value: "384"
      - key: TOP_K_DOCUMENTS
        value: "10"
      - key: TEMPERATURE
        value: "0.1"
      - key: MAX_TOKENS
        value: "1024"
      - key: RANDOM_SEED
        value: "42"
      - key: VECTOR_STORE_PATH
        value: data/vector_store
      - key: LOG_LEVEL
        value: INFO
      - key: CHAT_HISTORY_FILE
        value: logs/chat_history.jsonl
