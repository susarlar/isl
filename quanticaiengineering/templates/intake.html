<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intake — Fellow Power Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1333;
            min-height: 100vh;
            padding: 24px 20px 60px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("/static/background.png");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        /* Floating top-right nav, matches chat page */
        .header {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 5;
            background: transparent;
            color: white;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
            font-size: 12px;
            display: block;
            padding: 0;
        }
        .header h1 { display: none; }
        .header .nav a {
            color: white;
            text-decoration: underline;
            font-size: 12px;
            margin-left: 14px;
            opacity: 0.95;
        }
        .header .nav a:hover { opacity: 1; }

        /* Body becomes a transparent passthrough */
        .body {
            padding: 0;
            background: transparent;
        }

        /* Intro panel = frosted bubble */
        .intro {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 13px;
            color: #1a1333;
            margin-bottom: 20px;
            line-height: 1.5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Form is a frosted bubble too */
        form#intakeForm {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .field { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #1a1333;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            color: #1a1333;
            transition: background 0.2s, border-color 0.2s;
        }
        input::placeholder, textarea::placeholder { color: rgba(26, 19, 51, 0.55); }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.7);
        }
        textarea { resize: vertical; min-height: 64px; }

        button {
            padding: 13px 28px;
            background: rgba(255, 255, 255, 0.55);
            color: #1a1333;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background: rgba(255, 255, 255, 0.75); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Action plan result = frosted bubble */
        .result {
            margin-top: 24px;
            padding: 22px 26px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: #1a1333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .result h1, .result h2, .result h3, .result h4 {
            margin: 14px 0 8px;
            color: #1a1333;
        }
        .result h1 { font-size: 19px; }
        .result h2 { font-size: 17px; }
        .result h3 { font-size: 15px; }
        .result h4 { font-size: 14px; }
        .result p { margin: 8px 0; }
        .result ul, .result ol { margin: 8px 0 8px 22px; }
        .result li { margin: 4px 0; }
        .result strong { color: #1a1333; font-weight: 700; }
        .result code {
            background: rgba(26, 19, 51, 0.12);
            color: #1a1333;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.92em;
            font-family: ui-monospace, Menlo, Consolas, monospace;
        }
        .result blockquote {
            border-left: 3px solid rgba(26, 19, 51, 0.5);
            padding: 4px 12px;
            margin: 8px 0;
            color: #2a2148;
            font-style: italic;
        }
        .result table {
            border-collapse: collapse;
            width: 100%;
            margin: 14px 0;
            font-size: 13px;
        }
        .result th, .result td {
            border: 1px solid rgba(26, 19, 51, 0.2);
            padding: 7px 11px;
            text-align: left;
            vertical-align: top;
        }
        .result th {
            background: rgba(26, 19, 51, 0.12);
            color: #1a1333;
            font-weight: 600;
        }
        .result tr:nth-child(even) td {
            background: rgba(255, 255, 255, 0.18);
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .sources {
            margin-top: 12px;
            font-size: 12px;
            color: rgba(26, 19, 51, 0.75);
            padding: 0 6px;
        }
        .sources strong { color: #1a1333; }

        /* Followup chat — match the chat page bubbles */
        #followupArea {
            margin-top: 24px;
        }
        #followupForm input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #1a1333;
            border-radius: 28px;
            padding: 13px 18px;
        }
        #followupForm button {
            border-radius: 28px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav">
                <span>Logged in as <strong>{{ username }}</strong></span>
                <a href="/">← Chat</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
        <div class="body">
            <div class="intro">
                Quick onboarding for guild members new to Fellow Power optimization.
                Fill this out and you'll get a prioritized action plan based on your current account.
                Takes ~1 minute. This assumes you're already level 45+.
            </div>

            <form id="intakeForm">
                <div class="field">
                    <label for="account_level">Account level</label>
                    <input type="number" id="account_level" name="account_level" min="45" max="200" required placeholder="e.g., 58">
                </div>
                <div class="field">
                    <label for="main_typing">Main typing focus</label>
                    <select id="main_typing" name="main_typing" required>
                        <option value="">-- Select --</option>
                        <option value="Brave">Brave</option>
                        <option value="Diligent">Diligent</option>
                        <option value="Unfettered">Unfettered</option>
                        <option value="Inspiring">Inspiring</option>
                        <option value="Informed">Informed</option>
                        <option value="Unsure">Not sure yet</option>
                    </select>
                </div>
                <div class="field">
                    <label for="top_fellow">Your most powerful fellow (name)</label>
                    <input type="text" id="top_fellow" name="top_fellow" required placeholder="e.g., Amaterasu, Neptune, Mio">
                </div>
                <div class="field">
                    <label for="current_power">Approximate Fellow Power of your top fellow</label>
                    <input type="text" id="current_power" name="current_power" required placeholder="e.g., 12B, 250M, 1.4T">
                </div>
                <div class="field">
                    <label for="awakening_stars">Awakening stars on your top fellow</label>
                    <select id="awakening_stars" name="awakening_stars" required>
                        <option value="">-- Select --</option>
                        <option value="0">0★ (not awakened)</option>
                        <option value="1">1★</option>
                        <option value="2">2★</option>
                        <option value="3">3★</option>
                        <option value="4">4★</option>
                        <option value="5">5★</option>
                        <option value="6">6★</option>
                    </select>
                </div>
                <div class="field">
                    <label for="stella_level">Stella level on your top fellow (approximate)</label>
                    <input type="text" id="stella_level" name="stella_level" required placeholder="e.g., Lv 5, Lv 10, Lv 20, not unlocked">
                </div>
                <div class="field">
                    <label for="goal">What are you trying to improve?</label>
                    <select id="goal" name="goal" required>
                        <option value="">-- Select --</option>
                        <option value="Fellow Power (overall)">Fellow Power (overall)</option>
                        <option value="Single-carry power">Single-carry power</option>
                        <option value="Village earnings">Village earnings</option>
                        <option value="Siege Warfare ranking">Siege Warfare ranking</option>
                        <option value="Expo / Negotiation income">Expo / Negotiation income</option>
                        <option value="Banquet popularity">Banquet popularity</option>
                        <option value="Fishing rewards">Fishing rewards</option>
                        <option value="Event rankings">Event rankings</option>
                        <option value="Family blessings output">Family blessings output</option>
                        <option value="Not sure">Not sure — general advice</option>
                    </select>
                </div>
                <div class="field">
                    <label for="goal_detail">Extra context on your goal (optional)</label>
                    <textarea id="goal_detail" name="goal_detail" placeholder="e.g., want to hit 1T fellow power, cracking top 10 in next siege, stuck at 2M/day village earnings..."></textarea>
                </div>
                <div class="field">
                    <label for="resources">Resources you have stockpiled (optional)</label>
                    <textarea id="resources" name="resources" placeholder="e.g., 500 EXP stones, 200 Skill Pearls, 50 Stella fragments..."></textarea>
                </div>

                <button type="submit" id="submitBtn">Generate Action Plan</button>
            </form>

            <div id="resultArea"></div>

            <!-- Followup chat: appears after the intake answer lands -->
            <div id="followupArea" style="display:none; margin-top: 24px;">
                <div style="font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">
                    Follow-up questions
                </div>
                <div id="followupMessages"></div>
                <form id="followupForm" style="display: flex; gap: 10px; margin-top: 12px;">
                    <input
                        type="text"
                        id="followupInput"
                        placeholder="Ask a follow-up about your plan…"
                        autocomplete="off"
                        style="flex: 1; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none;"
                    >
                    <button type="submit" id="followupBtn" style="padding: 11px 22px;">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/markdown.js?v=5"></script>
    <script>
        const form = document.getElementById('intakeForm');
        const btn = document.getElementById('submitBtn');
        const resultArea = document.getElementById('resultArea');
        const followupArea = document.getElementById('followupArea');
        const followupMessages = document.getElementById('followupMessages');
        const followupForm = document.getElementById('followupForm');
        const followupInput = document.getElementById('followupInput');
        const followupBtn = document.getElementById('followupBtn');

        // Store the original intake context so follow-ups can reference it
        let intakeContext = "";

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Generating…';
            resultArea.innerHTML = '<div class="spinner"></div>';

            const payload = {};
            new FormData(form).forEach((v, k) => { payload[k] = v; });

            try {
                const resp = await fetch('/intake', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();

                if (data.status === 'error') {
                    resultArea.innerHTML = '<div class="result" style="border-left-color:#dc3545;background:#f8d7da;color:#721c24;">Error: ' + escapeHtml(data.error || 'Unknown') + '</div>';
                } else {
                    const answerHtml = window.renderMarkdown ? window.renderMarkdown(data.answer) : escapeHtml(data.answer);
                    let html = '<div class="result">' + answerHtml + '</div>';
                    if (data.sources && data.sources.length) {
                        html += '<div class="sources"><strong>Sources:</strong> ' +
                            data.sources.map(s => escapeHtml(s.filename)).join(', ') + '</div>';
                    }
                    resultArea.innerHTML = html;

                    // Remember what the user submitted + the initial answer so
                    // follow-up questions have context on the same player.
                    const summary = Object.entries(payload)
                        .filter(([k, v]) => v && k !== 'resources')
                        .map(([k, v]) => `${k}: ${v}`)
                        .join("; ");
                    intakeContext = "Player intake context — " + summary + ". Initial action plan was already provided; follow-up questions refer to that same player's situation.";

                    // Reveal the follow-up chat input
                    followupArea.style.display = 'block';
                    followupInput.focus();
                }
            } catch (err) {
                resultArea.innerHTML = '<div class="result" style="border-left-color:#dc3545;">Could not reach server.</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Action Plan';
            }
        });

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function appendFollowupMessage(role, contentHtml) {
            const wrap = document.createElement('div');
            wrap.style.margin = '14px 0';
            wrap.style.padding = '16px 20px';
            wrap.style.borderRadius = '12px';
            wrap.style.background = 'rgba(255, 255, 255, 0.5)';
            wrap.style.backdropFilter = 'blur(10px)';
            wrap.style.webkitBackdropFilter = 'blur(10px)';
            wrap.style.border = '1px solid rgba(255, 255, 255, 0.4)';
            wrap.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.3)';
            if (role === 'user') {
                wrap.style.maxWidth = '85%';
                wrap.style.marginLeft = 'auto';
            }
            const label = document.createElement('div');
            label.style.fontSize = '11px';
            label.style.fontWeight = '600';
            label.style.textTransform = 'uppercase';
            label.style.letterSpacing = '0.5px';
            label.style.color = '#1a1333';
            label.style.opacity = '0.7';
            label.style.marginBottom = '6px';
            label.textContent = role === 'user' ? 'You' : 'Advisor';
            wrap.appendChild(label);
            const body = document.createElement('div');
            body.className = 'result';
            body.style.background = 'transparent';
            body.style.backdropFilter = 'none';
            body.style.border = 'none';
            body.style.padding = '0';
            body.style.margin = '0';
            body.style.boxShadow = 'none';
            body.innerHTML = contentHtml;
            wrap.appendChild(body);
            followupMessages.appendChild(wrap);
            wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        followupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = followupInput.value.trim();
            if (!question) return;

            appendFollowupMessage('user', escapeHtml(question));
            followupInput.value = '';
            followupBtn.disabled = true;
            followupInput.disabled = true;

            // Prepend the intake context so the RAG system scopes retrieval
            // and the LLM answer to this specific player's setup.
            const contextualQuestion = intakeContext + "\n\nFollow-up question: " + question;

            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: contextualQuestion })
                });
                const data = await resp.json();
                if (data.status === 'error') {
                    appendFollowupMessage('assistant', '<div style="color:#721c24;">Error: ' + escapeHtml(data.error || 'unknown') + '</div>');
                } else {
                    const answerHtml = window.renderMarkdown ? window.renderMarkdown(data.answer) : escapeHtml(data.answer);
                    appendFollowupMessage('assistant', answerHtml);
                }
            } catch (err) {
                appendFollowupMessage('assistant', '<div style="color:#721c24;">Could not reach server.</div>');
            } finally {
                followupBtn.disabled = false;
                followupInput.disabled = false;
                followupInput.focus();
            }
        });
    </script>
</body>
</html>
