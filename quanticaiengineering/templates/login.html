<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Fellow Power Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 380px;
        }
        h1 {
            color: #2d1b69;
            font-size: 22px;
            margin-bottom: 8px;
            text-align: center;
        }
        p.subtitle {
            color: #666;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #11998e; }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2d1b69 0%, #11998e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-1px); }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            border-left: 3px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fellow Power Advisor</h1>
        <p class="subtitle">Guild members only</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <label for="username">In-Game Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" maxlength="40" pattern="[A-Za-z0-9_\- ]+" placeholder="Your guild name">
            <label for="password">Guild Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Enter</button>
        </form>
    </div>
</body>
</html>
