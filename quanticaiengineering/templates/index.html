<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isekai Slow Life - Fellow Power Advisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            background: #1a1333;
            overflow: hidden;
        }
        /* Background image — art is the star of the show */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("/static/background.png");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }

        /* Full-viewport container, no card/box, no background */
        .container {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 1;
            background: transparent;
        }

        /* Floating nav — top right, just text */
        .header {
            position: absolute;
            top: 16px;
            right: 20px;
            z-index: 3;
            background: transparent;
            color: white;
            text-align: right;
            padding: 0;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .header h1 { display: none; }
        .header p { display: none; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 80px 24px 120px;
            background: transparent;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        /* Hide scrollbar visual noise, keep scrolling */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 3px; }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: rgba(255, 255, 255, 0.5);
            color: #1a1333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .message.assistant .message-bubble {
            background: rgba(255, 255, 255, 0.5);
            color: #1a1333;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: left;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .message.assistant .message-bubble h1,
        .message.assistant .message-bubble h2,
        .message.assistant .message-bubble h3,
        .message.assistant .message-bubble h4 {
            margin: 12px 0 6px;
            color: #2d1b69;
        }
        .message.assistant .message-bubble h1 { font-size: 18px; }
        .message.assistant .message-bubble h2 { font-size: 16px; }
        .message.assistant .message-bubble h3 { font-size: 15px; }
        .message.assistant .message-bubble h4 { font-size: 14px; }
        .message.assistant .message-bubble p { margin: 8px 0; line-height: 1.55; }
        .message.assistant .message-bubble ul,
        .message.assistant .message-bubble ol { margin: 8px 0 8px 20px; }
        .message.assistant .message-bubble li { margin: 3px 0; line-height: 1.5; }
        .message.assistant .message-bubble strong { color: #11998e; }
        .message.assistant .message-bubble code {
            background: rgba(17, 153, 142, 0.12);
            color: #0d6b63;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.92em;
            font-family: ui-monospace, Menlo, Consolas, monospace;
        }
        .message.assistant .message-bubble pre {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message.assistant .message-bubble blockquote {
            border-left: 3px solid #11998e;
            padding: 4px 12px;
            margin: 8px 0;
            color: #555;
            font-style: italic;
        }
        .message.assistant .message-bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
            font-size: 13px;
        }
        .message.assistant .message-bubble th,
        .message.assistant .message-bubble td {
            border: 1px solid #dde;
            padding: 6px 10px;
            text-align: left;
            vertical-align: top;
        }
        .message.assistant .message-bubble th {
            background: rgba(17, 153, 142, 0.12);
            color: #0d6b63;
            font-weight: 600;
        }
        .message.assistant .message-bubble tr:nth-child(even) td {
            background: rgba(0, 0, 0, 0.025);
        }

        .sources {
            margin-top: 12px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 13px;
        }

        .source-item {
            margin: 8px 0;
            padding: 8px;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #11998e;
        }

        .source-title {
            font-weight: 600;
            color: #11998e;
            margin-bottom: 4px;
        }

        .source-snippet {
            color: #666;
            font-size: 12px;
            font-style: italic;
        }

        .source-score {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
        }

        .metrics {
            margin-top: 8px;
            padding: 8px;
            background: #e8f4f8;
            border-radius: 6px;
            font-size: 11px;
            color: #666;
        }

        .confidence-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .confidence-high {
            background: #d4edda;
            color: #155724;
        }

        .confidence-medium {
            background: #fff3cd;
            color: #856404;
        }

        .confidence-low {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #11998e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Floating input pinned to bottom of viewport, no panel background */
        .input-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 880px;
            padding: 0;
            background: transparent;
            border-top: none;
            z-index: 5;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        #questionInput {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #1a1333;
            transition: background 0.2s, border-color 0.2s;
        }
        #questionInput::placeholder { color: rgba(26, 19, 51, 0.6); }
        #questionInput:focus {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.65);
        }

        #sendButton {
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.5);
            color: #1a1333;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.2s;
        }
        #sendButton:hover:not(:disabled) { background: rgba(255, 255, 255, 0.7); }
        #sendButton:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Example questions panel removed from layout */
        .example-questions { display: none; }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px 0;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size:12px;">
                <span>Logged in as <strong>{{ username }}</strong></span>
                &nbsp;·&nbsp;
                <a href="/intake" style="color:white;text-decoration:underline;">Intake Mode</a>
                &nbsp;·&nbsp;
                <a href="/logout" style="color:white;text-decoration:underline;">Logout</a>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-bubble">
                    Welcome, adventurer! I'm your Fellow Power Advisor. I specialize in advanced optimization for level 45+ players — Fellow Power calculations, multiplier stacking, awakening strategy, Stella, fishing, and more. What would you like to optimize?
                </div>
            </div>
        </div>

        <div class="input-container">
            <form class="input-form" id="questionForm">
                <input
                    type="text"
                    id="questionInput"
                    placeholder="Ask about Fellow Power, Awakening, Stella, Fishing..."
                    required
                    autocomplete="off"
                />
                <button type="submit" id="sendButton">Send</button>
            </form>
        </div>
    </div>

    <script src="/static/markdown.js?v=5"></script>
    <script>
        const chatContainer = document.getElementById('chatContainer');
        const questionForm = document.getElementById('questionForm');
        const questionInput = document.getElementById('questionInput');
        const sendButton = document.getElementById('sendButton');

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;
            
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
            
            return messageDiv;
        }

        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant loading';
            loadingDiv.innerHTML = '<div class="spinner"></div>';
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();
            return loadingDiv;
        }

        function getConfidenceBadge(confidence) {
            let className = 'confidence-low';
            let label = 'Low';
            
            if (confidence > 0.8) {
                className = 'confidence-high';
                label = 'High';
            } else if (confidence > 0.6) {
                className = 'confidence-medium';
                label = 'Medium';
            }
            
            return `<span class="confidence-badge ${className}">${label} Confidence</span>`;
        }

        function addAnswerWithSources(answer, sources, metrics) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            
            // Answer text — rendered from markdown so # and ** become headers/bold
            const answerText = document.createElement('div');
            answerText.innerHTML = renderMarkdown(answer);
            bubbleDiv.appendChild(answerText);
            
            // Sources
            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = '<strong>📚 Sources:</strong>';
                
                sources.forEach((source, index) => {
                    const sourceItem = document.createElement('div');
                    sourceItem.className = 'source-item';
                    sourceItem.innerHTML = `
                        <div class="source-title">${index + 1}. ${source.title || source.filename}</div>
                        ${source.snippet ? `<div class="source-snippet">"${source.snippet}"</div>` : ''}
                        <div class="source-score">
                            📄 ${source.filename} • Relevance: ${(source.score * 100).toFixed(1)}%
                        </div>
                    `;
                    sourcesDiv.appendChild(sourceItem);
                });
                
                bubbleDiv.appendChild(sourcesDiv);
            }
            
            // Metrics
            if (metrics) {
                const metricsDiv = document.createElement('div');
                metricsDiv.className = 'metrics';
                metricsDiv.innerHTML = `
                    ⏱️ Response time: ${metrics.total_time.toFixed(2)}s
                    ${getConfidenceBadge(metrics.confidence)}
                `;
                bubbleDiv.appendChild(metricsDiv);
            }
            
            messageDiv.appendChild(bubbleDiv);
            chatContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function addError(errorMessage) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message assistant';
            errorDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="error-message">
                        ❌ <strong>Error:</strong> ${errorMessage}
                    </div>
                </div>
            `;
            chatContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        async function askQuestion(question) {
            // Add user message
            addMessage(question, true);

            // Add loading indicator
            const loadingDiv = addLoading();

            // Disable input
            sendButton.disabled = true;
            questionInput.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        question: question,
                        top_k: 5
                    })
                });

                // Remove loading indicator
                if (loadingDiv.parentNode) loadingDiv.remove();

                // Parse JSON safely — server may return HTML on hard crash
                let data;
                try {
                    data = await response.json();
                } catch (_parseError) {
                    addError('Server returned an unexpected response. Please try again in a moment.');
                    return;
                }

                if (data.status === 'error') {
                    addError(data.error || 'An error occurred. Please try again.');
                    return;
                }

                // Add answer with sources
                addAnswerWithSources(
                    data.answer,
                    data.sources,
                    {
                        total_time: data.processing_time,
                        confidence: data.confidence
                    }
                );

            } catch (error) {
                if (loadingDiv.parentNode) loadingDiv.remove();
                addError('Could not reach the server. Please check your connection and try again.');
            } finally {
                // Re-enable input
                sendButton.disabled = false;
                questionInput.disabled = false;
                questionInput.focus();
            }
        }

        function askExample(question) {
            questionInput.value = question;
            questionForm.dispatchEvent(new Event('submit'));
        }

        // Form submit handler
        questionForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const question = questionInput.value.trim();
            if (!question) return;
            
            // Clear input
            questionInput.value = '';
            
            // Ask question
            await askQuestion(question);
        });

        // Check health on load
        fetch('/health')
            .then(response => response.json().catch(() => ({ status: 'error' })))
            .then(data => {
                if (data.status !== 'healthy') {
                    addError('System is not ready: ' + (data.error || data.message || 'unknown error'));
                }
            })
            .catch(() => { /* silent — user will see error when they ask */ });

        // Keep-warm ping every 10 minutes — prevents cold starts and keeps
        // model pages hot in RAM on memory-constrained hosts
        setInterval(function () {
            fetch('/ping').catch(function () {});
        }, 10 * 60 * 1000);
    </script>
</body>
</html>
