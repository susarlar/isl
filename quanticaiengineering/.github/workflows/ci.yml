name: CI / CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint & static checks (fast — runs on every push/PR)
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flake8==7.0.0"

      - name: Lint (flake8)
        run: flake8 app/ scripts/ tests/ config.py

  # -----------------------------------------------------------------------
  # 2. Tests (smoke + unit — no API key required)
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      GROQ_API_KEY: ci-placeholder-not-real
      GROQ_MODEL: llama-3.1-70b-versatile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal subset for CI — skips torch/sentence-transformers (~800 MB)
          pip install \
            "flask==3.1.0" \
            "flask-cors==5.0.0" \
            "Werkzeug==3.1.3" \
            "python-dotenv>=1.0.0" \
            "numpy>=1.26.0" \
            "pytest>=8.0.0" \
            "pytest-cov>=4.1.0"

      - name: Verify app import
        run: |
          python -c "import sys; sys.path.insert(0,'.'); import app"

      - name: Run smoke & unit tests
        run: |
          pytest tests/test_smoke.py tests/test_evaluation.py tests/test_web_app.py \
            -v --tb=short \
            --ignore=tests/test_chunking.py \
            -k "not chunking"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  # -----------------------------------------------------------------------
  # 3. Build check — verify requirements install correctly
  # -----------------------------------------------------------------------
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate requirements.txt is parseable
        run: python -m pip install --dry-run -r requirements.txt 2>&1 | tail -5

  # -----------------------------------------------------------------------
  # 4. Deploy to Render (only on push to main after tests pass)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test]   # only deploy if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy webhook
        # Set RENDER_DEPLOY_HOOK_URL as a repository secret in GitHub:
        # Settings → Secrets and variables → Actions → New repository secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy trigger."
            echo "Set it in GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK_URL"
          else
            echo "Triggering Render deploy..."
            curl -s --fail-with-body \
              -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
              && echo "✓ Deploy triggered successfully" \
              || echo "✗ Deploy trigger failed"
          fi
